<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css.css">
</head>
<body id="admin-login-body">

    <div class="admin-login-container">
        <h2 class="admin-heading">Admin Login</h2>
        <form action="check_admin_login.jsp" method="post">
            <input type="email" name="mail" placeholder="Enter Email" class="admin-input" required>
            <input type="password" name="pwd" placeholder="Enter Password" class="admin-input" required>
            <input type="submit" value="Login" class="admin-btn">
        </form>
    </div>

</body>
</html>
